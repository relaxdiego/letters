name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # devbox + devbox.lock give CI the exact same Hugo, from the exact same
      # nixpkgs commit, as a developer gets by cd-ing into this directory.
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: "true"
          devbox-version: "0.16.0"

      # devbox.json and HUGO_VERSION name the same version in two places. This
      # is the only thing keeping them honest. HUGO_VERSION is what a human (or
      # an AI agent) reads decades from now when devbox no longer exists, so it
      # must never drift from what we actually build with.
      - name: Check the pinned Hugo version
        run: |
          want=$(tr -d '[:space:]' < HUGO_VERSION)
          got=$(devbox run -- hugo version)
          echo "HUGO_VERSION: $want"
          echo "devbox hugo:  $got"
          case "$got" in
            *"v${want}+extended"*) echo "ok: versions agree, extended build" ;;
            *) echo "::error::HUGO_VERSION says $want but devbox provides: $got"; exit 1 ;;
          esac

      - name: Build the site
        run: devbox run -- hugo --gc

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
